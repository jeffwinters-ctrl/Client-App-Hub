<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Sapper Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #F8F7F4; --surface: #fff; --ink: #1A1A1A; --ink-light: #6B6B6B; --rule: #E5E2DC; --primary: #1A1A1A; --error: #D32F2F; }
    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-area h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
    }
    .logo-area p { color: var(--ink-light); font-size: 0.95rem; margin-top: 8px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-weight: 600; font-size: 0.85rem;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-light); margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 1px solid var(--rule);
      border-radius: 8px; font-size: 1rem; font-family: inherit;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .btn {
      width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none;
      border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 1rem;
      font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; }
    .error-msg { color: var(--error); font-size: 0.9rem; text-align: center; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <h1>SAPPER ADMIN</h1>
      <p>Manage clients, apps, and analytics</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>Admin Password</label>
        <input type="password" id="password" placeholder="Enter admin password" required>
      </div>
      <button type="submit" class="btn" id="loginBtn">Sign In</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      btn.disabled = true;
      err.style.display = 'none';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.success) window.location.href = '/admin';
        else { err.textContent = data.error; err.style.display = 'block'; }
      } catch (ex) { err.textContent = 'Connection error'; err.style.display = 'block'; }
      btn.disabled = false;
    });
  </script>
</body>
</html>
