<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — {{COMPANY_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: {{PRIMARY_COLOR}};
      --accent: {{ACCENT_COLOR}};
      --bg: #F8F7F4;
      --surface: #FFFFFF;
      --ink: #1A1A1A;
      --ink-light: #6B6B6B;
      --rule: #E5E2DC;
      --error: #D32F2F;
    }
    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area img {
      max-height: 48px;
      max-width: 200px;
      margin-bottom: 16px;
    }
    .logo-area h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
      color: var(--primary);
    }
    .logo-area p {
      color: var(--ink-light);
      font-size: 0.95rem;
      margin-top: 8px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-light);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--rule);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      color: var(--error);
      font-size: 0.9rem;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .powered-by {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--ink-light);
    }
    @media (max-width: 480px) {
      .login-card { margin: 16px; padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <img src="{{LOGO_URL}}" alt="{{COMPANY_NAME}}" onerror="this.style.display='none'">
      <h1>{{COMPANY_NAME}}</h1>
      <p>Sign in to access your tools</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your access code" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="powered-by">Powered by {{POWERED_BY}}</div>
  </div>
  <script>
    const SLUG = '{{SLUG}}';
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = 'SIGNING IN...';
      err.style.display = 'none';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            slug: SLUG,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = data.redirect;
        } else {
          err.textContent = data.error || 'Invalid credentials';
          err.style.display = 'block';
        }
      } catch (ex) {
        err.textContent = 'Connection error. Please try again.';
        err.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'SIGN IN';
    });
  </script>
</body>
</html>
