<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{COMPANY_NAME}} — Sales Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: {{PRIMARY_COLOR}};
      --accent: {{ACCENT_COLOR}};
      --bg: #F5F4F1;
      --surface: #FFFFFF;
      --ink: #1A1A1A;
      --ink-light: #6B6B6B;
      --rule: #E5E2DC;
    }
    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 0 40px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-brand img {
      height: 30px;
      filter: brightness(0) invert(1);
    }
    .header-brand h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .btn-sign-out {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-sign-out:hover { background: rgba(255,255,255,0.22); }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, color-mix(in srgb, var(--primary) 65%, #000) 100%);
      color: #fff;
      padding: 64px 40px 72px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -40%;
      left: -5%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-inner {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .hero-greeting {
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 12px;
    }
    .hero-title {
      font-family: 'Oswald', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 12px;
    }
    .hero-title em {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      color: var(--accent);
    }
    .hero-subtitle {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 1.15rem;
      opacity: 0.8;
      max-width: 500px;
    }

    /* ── Main Content ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px;
      position: relative;
      z-index: 2;
      margin-top: -32px;
    }

    /* ── App Grid ── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .app-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 36px 32px 32px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      min-height: 260px;
      opacity: 0;
      transform: translateY(24px);
      animation: cardIn 0.5s ease forwards;
    }
    .app-card:nth-child(1) { animation-delay: 0.1s; }
    .app-card:nth-child(2) { animation-delay: 0.2s; }
    .app-card:nth-child(3) { animation-delay: 0.3s; }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .app-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 48px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
      border-color: var(--accent);
    }
    .app-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 60%, var(--primary)));
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .app-card:hover::before { opacity: 1; }

    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      flex-shrink: 0;
    }
    .app-icon svg {
      width: 30px;
      height: 30px;
    }
    .app-icon.icon-dealcheck {
      background: linear-gradient(135deg, #FF6B35, #E8A020);
    }
    .app-icon.icon-business-case {
      background: linear-gradient(135deg, #2E86DE, #54A0FF);
    }
    .app-icon.icon-linkedin-post {
      background: linear-gradient(135deg, #8854D0, #A55EEA);
    }
    .app-icon.icon-default {
      background: var(--primary);
    }

    .app-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }
    .app-desc {
      font-size: 0.95rem;
      color: var(--ink-light);
      line-height: 1.6;
      flex: 1;
    }
    .app-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      transition: gap 0.2s ease;
    }
    .app-card:hover .app-cta { gap: 14px; }
    .app-cta svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s ease;
    }
    .app-card:hover .app-cta svg { transform: translateX(4px); }

    /* ── Tip Section ── */
    .tip-section {
      margin-top: 48px;
      margin-bottom: 32px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 28px 32px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      opacity: 0;
      animation: cardIn 0.5s ease 0.45s forwards;
    }
    .tip-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, var(--primary)));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tip-icon svg { width: 22px; height: 22px; }
    .tip-content { flex: 1; }
    .tip-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .tip-text {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--ink-light);
      line-height: 1.6;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 40px 24px 32px;
      font-size: 0.78rem;
      color: var(--ink-light);
      letter-spacing: 0.03em;
    }
    .footer span {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header { padding: 0 20px; }
      .hero { padding: 48px 20px 56px; }
      .hero-title { font-size: 2rem; }
      .main { padding: 0 20px; margin-top: -24px; }
      .app-grid { grid-template-columns: 1fr; }
      .app-card { min-height: 200px; }
      .tip-section { flex-direction: column; gap: 12px; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .app-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <img src="{{LOGO_URL}}" alt="" onerror="this.style.display='none'">
      <h1>{{COMPANY_NAME}}</h1>
    </div>
    <button class="btn-sign-out" onclick="logout()">Sign Out</button>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-greeting" id="heroGreeting"></div>
      <h2 class="hero-title">Welcome back to <em>{{COMPANY_NAME}}</em></h2>
      <p class="hero-subtitle">What can we help you with today?</p>
    </div>
  </section>

  <main class="main">
    <div class="app-grid" id="appGrid"></div>

    <div class="tip-section" id="tipSection">
      <div class="tip-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      </div>
      <div class="tip-content">
        <div class="tip-label">Sales Tip of the Day</div>
        <div class="tip-text" id="tipText"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    Powered by <span>{{POWERED_BY}}</span>
  </footer>

  <script>
    const CLIENT_CONFIG = {{CLIENT_CONFIG}};
    const SLUG = '{{SLUG}}';
    const APPS = {{APPS_JSON}};

    // Time-based greeting
    const hour = new Date().getHours();
    let greeting = 'Good evening';
    if (hour < 12) greeting = 'Good morning';
    else if (hour < 17) greeting = 'Good afternoon';
    document.getElementById('heroGreeting').textContent = greeting;

    // App metadata
    const APP_META = {
      'dealcheck': {
        name: 'DealCheck',
        iconClass: 'icon-dealcheck',
        icon: '<svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
        description: 'Get an AI-powered health check on any active deal. Answer a few questions, get a score, specific findings, and three ready-to-use plays to move it forward.'
      },
      'business-case': {
        name: 'Business Case Builder',
        iconClass: 'icon-business-case',
        icon: '<svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>',
        description: 'Generate a polished ROI business case your prospect can take to their CFO. Enter the deal details, get a professional document in minutes — not days.'
      },
      'linkedin-post': {
        name: 'LinkedIn Post Writer',
        iconClass: 'icon-linkedin-post',
        icon: '<svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>',
        description: 'Create three engaging LinkedIn posts that position you as a thought leader. Choose from story, insight, and hot take styles — ready to copy and post.'
      }
    };

    const arrowSvg = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>';

    // Render cards
    const grid = document.getElementById('appGrid');
    APPS.forEach(appId => {
      const meta = APP_META[appId];
      if (!meta) return;
      const card = document.createElement('a');
      card.className = 'app-card';
      card.href = '/' + SLUG + '/' + appId;
      card.innerHTML =
        '<div class="app-icon ' + meta.iconClass + '">' + meta.icon + '</div>' +
        '<div class="app-name">' + meta.name + '</div>' +
        '<div class="app-desc">' + meta.description + '</div>' +
        '<div class="app-cta">Launch ' + arrowSvg + '</div>';
      grid.appendChild(card);
    });

    // Sales tips
    const tips = [
      "The best reps don't sell features — they sell the cost of doing nothing. Quantify the pain before you pitch the solution.",
      "If you can't describe your prospect's problem better than they can, you haven't earned the right to propose a solution.",
      "Multi-threading isn't optional. If your deal depends on one champion, it's one resignation away from dying.",
      "The close doesn't happen in the last meeting — it happens in every meeting before it. Advance or die.",
      "Procurement isn't the enemy. They have a job to do. Give them what they need and they'll help you close faster.",
      "Your prospect's status quo is your biggest competitor. Make 'doing nothing' feel more expensive than change.",
      "A mutual action plan with dates, owners, and milestones closes deals 38% faster than 'we'll circle back.'",
      "Stop sending 'just checking in' emails. Every touch should deliver value — an insight, a resource, a connection.",
      "The rep who controls the narrative controls the deal. Write the business case FOR them, don't wait for them to build it.",
      "Ask your champion: 'If you were me, what would you do to get this across the finish line?' Then do exactly that."
    ];
    document.getElementById('tipText').textContent = tips[Math.floor(Math.random() * tips.length)];

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/' + SLUG + '/login';
    }
  </script>
</body>
</html>
