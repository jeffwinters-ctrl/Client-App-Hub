<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Found — Sapper Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: #F8F7F4;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .error-page h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 4rem;
      font-weight: 600;
      color: #D32F2F;
      margin-bottom: 12px;
    }
    .error-page p {
      font-size: 1.1rem;
      color: #6B6B6B;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <h1>404</h1>
    <p>This page doesn't exist. If you think this is an error, contact your account manager.</p>
  </div>
</body>
</html>
